name: Bug report
description: Report a reproducible problem in the app.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the issue clearly and concisely.
      placeholder: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: Where did this happen?
      placeholder: Android, iOS, Web, macOS

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add screenshots, logs, or any details that help narrow the issue.
