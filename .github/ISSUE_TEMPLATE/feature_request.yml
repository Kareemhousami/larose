name: Feature request
description: Suggest a product or engineering improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: Explain the need behind this request.
      placeholder: What user or business problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
      placeholder: What should the app do?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Explain why this change matters.
      placeholder: Better conversion, clearer UX, fewer support issues, etc.

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add references, mockups, or constraints if they matter.
